services:
  - type: web
    name: sentinel-mesh-relay
    runtime: python
    rootDir: sentinel-mesh/server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn relay_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEMO_MODE
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.0"
    plan: free
    healthCheckPath: /api/health
