services:
  - type: web
    name: sentinel-mesh-relay
    runtime: python
    rootDir: sentinel-mesh/server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn relay_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEMO_MODE
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.0"
      # Gemini chatbot anahtarı — değeri YALNIZCA Render panelinden girilir,
      # repoya yazılmaz (sync: false). GitHub'a anahtar gitmez.
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: "gemini-2.5-flash"
      # /ingest token — boş bırakılırsa kapalı (herkes push edebilir). Üretimde
      # Render panelinden bir değer girin ve Pi relay URL'ine ?token=... ekleyin.
      - key: INGEST_TOKEN
        sync: false
      # Kritik saldırıda anlık mobil bildirim (Telegram). @BotFather'dan token,
      # getUpdates'ten chat id. Boşsa bildirim kapalı.
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
    plan: free
    healthCheckPath: /api/health
